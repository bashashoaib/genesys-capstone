{% extends "base.html" %}
{% block body %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">Mini-Genesys Login</h3>
          <p class="text-muted small">Demo accounts: admin/admin123 and agent/agent123</p>
          <form id="login-form">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" id="username" value="admin" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="password" value="admin123" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Sign in</button>
          </form>
          <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
