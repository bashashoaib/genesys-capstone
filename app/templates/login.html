{% extends "base.html" %}
{% block body %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="mb-3">
        <i class="bi bi-headset" style="font-size: 2.5rem; color: var(--primary);"></i>
      </div>
      <h3 class="mb-1">Mini-Genesys</h3>
      <p class="text-muted small mb-0">Contact Center Platform</p>
    </div>
    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="position-relative">
          <input class="form-control" id="username" value="admin" required
                 style="padding-left: 2.5rem;">
          <i class="bi bi-person position-absolute" style="left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="position-relative">
          <input type="password" class="form-control" id="password" value="admin123" required
                 style="padding-left: 2.5rem;">
          <i class="bi bi-lock position-absolute" style="left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
        </div>
      </div>
      <button class="btn btn-primary w-100" type="submit">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
    <div class="text-center mt-4">
      <p class="text-muted" style="font-size: 0.75rem;">
        Demo: <strong>admin</strong>/admin123 or <strong>agent</strong>/agent123
      </p>
    </div>
  </div>
</div>
{% endblock %}
